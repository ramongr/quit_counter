name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: html-validate + oxlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise (pinned Node)
        uses: jdx/mise-action@v2
        with:
          experimental: true
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint
